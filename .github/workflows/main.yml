name: CI/CD Workflow  # Tên quy trình

on:
  push:
    branches: ["main"]  # Chạy khi có code mới đẩy lên nhánh main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest  # Sử dụng máy ảo Ubuntu của GitHub

    steps:
      - name: Print greeting
        run: echo "Hello HUTECH! Chào Vinh Sơn"  # Lời chào dành cho bạn

      - name: Checkout code
        uses: actions/checkout@v4  # Cập nhật lên v4 ổn định nhất hiện tại

      - name: Read README file
        run: cat README.md

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Nên thêm cái này để build Docker hiệu quả hơn

      - name: Login to Docker Hub
        uses: docker/login-action@v3  # Cập nhật lên v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6  # Cập nhật lên v6 mới nhất
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/duanjava:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="vinhsonvlog/duanjava"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=8&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
